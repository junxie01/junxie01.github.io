<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SEISAMUSE{% endblock %} | Jun Xie</title>
  <meta name="description" content="{% block description %}Personal academic website of Jun Xie — Seismologist{% endblock %}">
  <link rel="stylesheet" href="{{ root }}css/style.css">
  <!-- Favicon (placeholder) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>">
</head>
<body>

  <nav>
    <div class="container">
      <a href="{{ root }}" class="site-title">SEISAMUSE</a>
      <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')" aria-label="Menu">&#9776;</button>
      <ul class="nav-links">
        <li><a href="{{ root }}"{% if active == 'home' %} class="active"{% endif %}>Home</a></li>
        <li><a href="{{ root }}blog/"{% if active == 'blog' %} class="active"{% endif %}>Blog</a></li>
        <li><a href="{{ root }}about/"{% if active == 'about' %} class="active"{% endif %}>About</a></li>
        <li><a href="{{ root }}links/"{% if active == 'links' %} class="active"{% endif %}>Links</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </main>

  <footer>
    <div class="container">
      <p>&copy; {{ year }} Jun Xie &middot; Built with Python &amp; Markdown &middot;
        <a href="https://github.com/" target="_blank">GitHub</a>
      </p>
    </div>
  </footer>

</body>
</html>
